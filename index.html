  <style>
    * { box-sizing: border-box; }
    
    body {
      background: #0a0a0a;
      min-height: 100vh;
      color: #e8e4dc;
    }
    
    /* Noise overlay */
    .noise-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0.04;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
    
    /* Scanlines */
    .scanlines::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      z-index: 2;
    }
    
    /* Glitch effect */
    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
    }
    
    @keyframes glitchColor {
      0%, 100% { text-shadow: none; }
      25% { text-shadow: -2px 0 #ff006e, 2px 0 #00f5ff; }
      50% { text-shadow: 2px 0 #ff006e, -2px 0 #00f5ff; }
      75% { text-shadow: -1px 0 #ff006e, 1px 0 #00f5ff; }
    }
    
    .glitch-hover:hover {
      animation: glitch 0.3s ease-in-out, glitchColor 0.3s ease-in-out;
    }
    
    .glitch-text {
      position: relative;
    }
    
    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
    }
    
    .glitch-text:hover::before {
      animation: glitchTop 0.3s ease-in-out;
      color: #ff006e;
      opacity: 0.8;
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
    }
    
    .glitch-text:hover::after {
      animation: glitchBottom 0.3s ease-in-out;
      color: #00f5ff;
      opacity: 0.8;
      clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
    }
    
    @keyframes glitchTop {
      0%, 100% { transform: translate(0); }
      50% { transform: translate(-3px, -1px); }
    }
    
    @keyframes glitchBottom {
      0%, 100% { transform: translate(0); }
      50% { transform: translate(3px, 1px); }
    }
    
    /* Button click effect */
    .btn-click {
      transition: all 0.1s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn-click:active {
      transform: scale(0.97);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    }
    
    .btn-click::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
    }
    
    .btn-click:active::after {
      width: 200%; height: 200%;
    }
    
    /* Distortion hover */
    .distort-hover {
      transition: all 0.3s ease;
    }
    
    .distort-hover:hover {
      filter: url('#distortion') brightness(1.05);
      transform: scale(1.02);
    }
    
    /* Card styles */
    .card-dark {
      background: linear-gradient(145deg, #1a1a1a 0%, #141414 100%);
      border: 1px solid #2a2a2a;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-dark:hover {
      border-color: #c9a86c;
      box-shadow: 0 0 30px rgba(201, 168, 108, 0.1);
      transform: translateY(-2px);
    }
    
    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Terminal cursor */
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    .cursor-blink::after {
      content: '|';
      animation: blink 1s infinite;
      color: #c9a86c;
    }
    
    /* Heatmap cells */
    .heat-cell {
      transition: all 0.2s ease;
    }
    
    .heat-cell:hover {
      transform: scale(1.8);
      z-index: 10;
      box-shadow: 0 0 10px currentColor;
    }
    
    /* Playback message */
    @keyframes slideIn {
      0% { opacity: 0; transform: translateX(-20px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    
    .msg-slide {
      animation: slideIn 0.3s ease-out forwards;
    }
    
    /* Heartbeat */
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
    }
    
    .heartbeat {
      animation: heartbeat 1.5s ease-in-out infinite;
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #141414; }
    ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c9a86c; }
    
    /* Typewriter effect */
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    
    .typewriter {
      overflow: hidden;
      white-space: nowrap;
      animation: typewriter 2s steps(40) forwards;
    }
  </style>

    // Utility functions
    const normalizeText = (text) => text.toLowerCase().replace(/[.,!?;:'"()\[\]{}…]/g, '').replace(/\s+/g, ' ').trim();
    
    const extractEmojis = (text) => {
      const emojiRegex = /[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]/gu;
      return text.match(emojiRegex) || [];
    };

    const getWordFrequency = (messages) => {
      const wordCount = {};
      messages.forEach(msg => {
        normalizeText(msg.text).split(' ').forEach(word => {
          if (word.length > 2 && !TURKISH_STOP_WORDS.has(word)) {
            wordCount[word] = (wordCount[word] || 0) + 1;
          }
        });
      });
      return Object.entries(wordCount).sort((a, b) => b[1] - a[1]).slice(0, 100);
    };

    const getEmojiFrequency = (messages) => {
      const emojiCount = {};
      messages.forEach(msg => {
        extractEmojis(msg.text).forEach(emoji => {
          emojiCount[emoji] = (emojiCount[emoji] || 0) + 1;
        });
      });
      return Object.entries(emojiCount).sort((a, b) => b[1] - a[1]);
    };

    const categorizeSentiment = (text) => {
      const t = text.toLowerCase();
      if (/seviyorum|aşk|❤️|💕|💗|😘|🥰|💖|özledim|öpüyorum/.test(t)) return 'love';
      if (/😂|🤣|haha|:D|🤪|😁/.test(t)) return 'humor';
      if (/kız|sinir|😡|😤|😢|kavga/.test(t)) return 'tension';
      if (/düşün|hayat|anlam|felsefe/.test(t)) return 'deep';
      return 'neutral';
    };

    const isNightMessage = (time) => {
      if (!time) return false;
      const hour = parseInt(time.split(':')[0]);
      return hour >= 23 || hour < 6;
    };

    const formatNumber = (num) => num?.toLocaleString('tr-TR') || '0';
    
    const formatDate = (dateStr) => {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
    };

    const formatDateShort = (dateStr) => {
      if (!dateStr) return '';

        setIsRevealing(true);
        setTimeout(() => {
          const startIdx = Math.floor(Math.random() * Math.max(1, messages.length - 10));
          setMemory(messages.slice(startIdx, startIdx + Math.min(8, messages.length)));
          setIsRevealing(false);
        }, 400);
      }, [messages]);
      
      useEffect(() => { getRandomMemory(); }, []);
      
      return (
        <div className="max-w-2xl mx-auto space-y-6">
          <div className="text-center mb-8">
            <p className="font-mono text-xs text-accent mb-2">&gt; memory.random()</p>
            <h2 className="font-serif text-3xl text-cream">Rastgele Bir Anı</h2>
            <p className="font-mono text-xs text-textMuted mt-2">// Geçmişten bir parça</p>
          </div>
          
          <button
            onClick={getRandomMemory}
            disabled={isRevealing}
            className="btn-click w-full font-mono bg-mutedGray border border-accent text-accent py-4 hover:bg-accent hover:text-dark transition-all disabled:opacity-50"
          >
            {isRevealing ? '[ YÜKLENİYOR... ]' : '[ BAŞKA BİR ANI ]'}
          </button>
          
          {memory && (
            <div className={`card-dark rounded-none p-6 transition-all duration-500 ${isRevealing ? 'opacity-0 scale-95' : 'opacity-100 scale-100'}`}>
              <p className="font-mono text-xs text-textMuted text-center mb-4">// {formatDate(memory[0]?.date)}</p>
              <div className="space-y-3">
                {memory.map((msg, index) => (
                  <div key={index} className={`flex ${msg.sender === 'Fırat' ? 'justify-start' : 'justify-end'}`}>
                    <div className={`max-w-[85%] p-3 ${msg.sender === 'Fırat' ? 'bg-mutedGray border-l-2 border-l-accent' : 'bg-softGray border-r-2 border-r-glitch1'}`}>
                      <span className="font-mono text-xs text-textMuted block mb-1">{msg.sender} · {msg.time}</span>
                      <p className="font-serif text-cream text-sm whitespace-pre-wrap">{msg.text}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==================== PLAYBACK MODE ====================
    const PlaybackMode = ({ messages }) => {
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [visibleMessages, setVisibleMessages] = useState([]);
      const [currentlyTyping, setCurrentlyTyping] = useState(null);
      const [displayedText, setDisplayedText] = useState('');
      const containerRef = useRef(null);
      const typingSpeed = 25; // ms per character
      
      // Typewriter effect for current message
      useEffect(() => {
        if (!currentlyTyping) return;
        
        const fullText = currentlyTyping.text;
        let charIndex = 0;
        
        const typeInterval = setInterval(() => {
          if (charIndex <= fullText.length) {
            setDisplayedText(fullText.slice(0, charIndex));
            charIndex++;
          } else {
            clearInterval(typeInterval);
            // Message fully typed, add to visible and move to next
            setVisibleMessages(prev => [...prev.slice(-30), { ...currentlyTyping, fullyTyped: true }]);
            setCurrentlyTyping(null);
            setDisplayedText('');
          }
        }, typingSpeed);
        
        return () => clearInterval(typeInterval);
      }, [currentlyTyping]);
      
      // Move to next message when current one finishes
      useEffect(() => {
        if (!isPlaying || currentlyTyping || currentIndex >= messages.length) return;
        
        // Small delay between messages
        const delay = setTimeout(() => {
          setCurrentlyTyping(messages[currentIndex]);
          setCurrentIndex(prev => prev + 1);
        }, 300);
        
        return () => clearTimeout(delay);
      }, [isPlaying, currentlyTyping, currentIndex, messages]);
      
      useEffect(() => {
        if (containerRef.current) {
          containerRef.current.scrollTop = containerRef.current.scrollHeight;
        }
      }, [visibleMessages, displayedText]);
      
      const reset = () => { 
        setIsPlaying(false); 
        setCurrentIndex(0); 
        setVisibleMessages([]); 
        setCurrentlyTyping(null);
        setDisplayedText('');
      };
      
      const togglePlay = () => {
        setIsPlaying(!isPlaying);
      };
      
      const skipCurrent = () => {
        if (currentlyTyping) {
          setVisibleMessages(prev => [...prev.slice(-30), { ...currentlyTyping, fullyTyped: true }]);
          setCurrentlyTyping(null);
          setDisplayedText('');
        }
      };
      
      const progress = (currentIndex / messages.length) * 100;
      
      return (
        <div className="space-y-6">
          <div className="text-center mb-8">
            <p className="font-mono text-xs text-accent mb-2">&gt; playback.typewriter()</p>
            <h2 className="font-serif text-3xl text-cream">Zaman Yolculuğu</h2>
            <p className="font-mono text-xs text-textMuted mt-2">// mesajlar yazıldığı gibi akıyor</p>
          </div>
          
          <div className="card-dark rounded-none p-6">
            <div className="flex flex-wrap gap-4 items-center justify-center mb-6">
              <button onClick={togglePlay} className="btn-click font-mono bg-accent text-dark px-6 py-3 hover:bg-cream transition-all">
                {isPlaying ? '[ DURAKLAT ]' : '[ BAŞLAT ]'}
              </button>
              <button onClick={skipCurrent} disabled={!currentlyTyping} className="btn-click font-mono border border-textMuted text-textMuted px-6 py-3 hover:border-accent hover:text-accent transition-all disabled:opacity-30">
                [ ATLA ]
              </button>
              <button onClick={reset} className="btn-click font-mono border border-textMuted text-textMuted px-6 py-3 hover:border-accent hover:text-accent transition-all">
                [ SIFIRLA ]
              </button>
            </div>
            
            <div className="mb-4">
              <div className="w-full bg-mutedGray h-1">
                <div className="bg-accent h-1 transition-all" style={{ width: `${progress}%` }} />
              </div>
              <div className="flex justify-between mt-2">
                <span className="font-mono text-xs text-textMuted">
                  {visibleMessages[0] ? formatDateShort(visibleMessages[0].date) : '...'}
                </span>
                <span className="font-mono text-xs text-accent">
                  {formatNumber(currentIndex)} / {formatNumber(messages.length)}
                </span>
              </div>
            </div>
            
            {currentlyTyping && (
              <div className="text-center">
                <span className="font-mono text-xs text-glitch1 animate-pulse">
                  ● {currentlyTyping.sender} yazıyor...
                </span>
              </div>
            )}
          </div>
          
          <div ref={containerRef} className="card-dark rounded-none p-4 h-[500px] overflow-y-auto">
            <div className="space-y-3">
              {/* Already typed messages */}
              {visibleMessages.map((msg, index) => (
                <div key={index} className={`msg-slide flex ${msg.sender === 'Fırat' ? 'justify-start' : 'justify-end'}`}>
                  <div className={`max-w-[80%] p-3 ${msg.sender === 'Fırat' ? 'bg-mutedGray border-l-2 border-l-accent' : 'bg-softGray border-r-2 border-r-glitch1'}`}>
                    <div className="flex justify-between items-center mb-2 gap-3">
                      <span className="font-mono text-xs text-accent">{msg.sender}</span>
                      <span className="font-mono text-xs text-textMuted">{formatDateShort(msg.date)} {msg.time}</span>
                    </div>
                    <p className="font-serif text-cream text-sm whitespace-pre-wrap leading-relaxed">{msg.text}</p>
                  </div>
                </div>
              ))}
              
              {/* Currently typing message */}
              {currentlyTyping && (
                <div className={`flex ${currentlyTyping.sender === 'Fırat' ? 'justify-start' : 'justify-end'}`}>
                  <div className={`max-w-[80%] p-3 ${currentlyTyping.sender === 'Fırat' ? 'bg-mutedGray border-l-2 border-l-accent' : 'bg-softGray border-r-2 border-r-glitch1'}`}>
                    <div className="flex justify-between items-center mb-2 gap-3">
                      <span className="font-mono text-xs text-accent">{currentlyTyping.sender}</span>
                      <span className="font-mono text-xs text-textMuted">{formatDateShort(currentlyTyping.date)} {currentlyTyping.time}</span>
                    </div>
                    <p className="font-serif text-cream text-sm whitespace-pre-wrap leading-relaxed">
                      {displayedText}
                      <span className="inline-block w-0.5 h-4 bg-accent ml-0.5 animate-pulse"></span>
                    </p>
                  </div>
                </div>
              )}
            </div>
          </div>
          
          <div className="card-dark rounded-none p-4 border-l-4 border-l-accent">
            <p className="font-serif text-sm text-textLight italic">
              💡 Her mesaj, karakter sayısına göre yazılıyor. Uzun mesajlar daha uzun sürüyor — tıpkı gerçekte olduğu gibi.
            </p>
          </div>
        </div>
      );
    };

    // ==================== INSIGHTS ====================
    const Insights = ({ stats, messages }) => {
      const sentimentChartRef = useRef(null);
      const sentimentChartInstance = useRef(null);
      
      const sentimentData = useMemo(() => {
        const counts = { love: 0, humor: 0, tension: 0, deep: 0, neutral: 0 };
        messages.forEach(msg => { counts[categorizeSentiment(msg.text)]++; });
        return counts;
      }, [messages]);
      
      useEffect(() => {
        if (sentimentChartRef.current) {
          if (sentimentChartInstance.current) sentimentChartInstance.current.destroy();
          
          sentimentChartInstance.current = new Chart(sentimentChartRef.current.getContext('2d'), {
            type: 'doughnut',
            data: {
              labels: ['sevgi', 'mizah', 'gerilim', 'derin', 'günlük'],
              datasets: [{
                data: [sentimentData.love, sentimentData.humor, sentimentData.tension, sentimentData.deep, sentimentData.neutral],
                backgroundColor: ['#ff006e', '#c9a86c', '#8b7355', '#00f5ff', '#3a3a3a'],
                borderWidth: 0
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { position: 'bottom', labels: { font: { family: 'JetBrains Mono', size: 10 }, color: '#888', padding: 15 } } }
            }
          });
        }
        return () => { if (sentimentChartInstance.current) sentimentChartInstance.current.destroy(); };
      }, [sentimentData]);
      
      const insights = [
        { icon: '⚖', title: 'Denge', text: `Fırat %${((stats.firatMessages / stats.totalMessages) * 100).toFixed(1)}, Nur %${((stats.nurMessages / stats.totalMessages) * 100).toFixed(1)}. Mükemmele yakın.`, personal: 'Bu dengeyi korumak zor, Fırat. Aferin.' },
        { icon: '◎', title: 'Gece', text: `Mesajların %${((stats.nightMessages / stats.totalMessages) * 100).toFixed(1)}'i gece yarısından sonra.`, personal: 'En samimi sohbetler gecede olur.' },
        { icon: '❤', title: 'Sevgi', text: `Mesajların %${((sentimentData.love / stats.totalMessages) * 100).toFixed(1)}'i sevgi içerikli.`, personal: 'Bu oran çok sağlıklı.' },
        { icon: '◇', title: 'Prime Time', text: `En yoğun saat: ${stats.peakHour}:00.`, personal: 'Bu saat artık sizin.' },
      ];
      
      return (
        <div className="space-y-6">
          <div className="text-center mb-8">
            <p className="font-mono text-xs text-accent mb-2">&gt; insights.analyze()</p>
            <h2 className="font-serif text-3xl text-cream">İlişki Analizi</h2>
          </div>
          
          <div className="grid md:grid-cols-2 gap-6">
            <div className="card-dark rounded-none p-6">
              <p className="font-mono text-xs text-textMuted mb-4">// Duygu Dağılımı</p>
              <div className="h-64"><canvas ref={sentimentChartRef}></canvas></div>
            </div>
            
            <div className="space-y-4">
              {insights.map((insight, index) => (
                <div key={index} className="card-dark rounded-none p-5 border-l-2 border-l-transparent hover:border-l-accent transition-all">
                  <div className="flex items-start gap-4">
                    <span className="font-mono text-2xl text-accent">{insight.icon}</span>
                    <div>
                      <h4 className="font-mono text-sm text-cream mb-1">{insight.title}</h4>
                      <p className="font-serif text-textLight text-sm">{insight.text}</p>
                      <p className="font-serif text-xs text-accent italic mt-2">{insight.personal}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ==================== MILESTONES ====================
    const Milestones = ({ messages, stats }) => {
      const milestones = useMemo(() => {
        const results = [];
        
        if (messages.length > 0) {
          results.push({ date: messages[0].date, title: 'İlk Mesaj', desc: `"${messages[0].text.slice(0, 50)}..."`, icon: '▶' });
        }
        
        const firstCanim = messages.find(m => /canım/i.test(m.text));
        if (firstCanim) results.push({ date: firstCanim.date, title: 'İlk "Canım"', desc: `${firstCanim.sender} ilk söyledi`, icon: '♡' });
        
        const firstLove = messages.find(m => /seni seviyorum/i.test(m.text));
        if (firstLove) results.push({ date: firstLove.date, title: 'İlk "Seni Seviyorum"', desc: `${firstLove.sender}`, icon: '❤' });
        
        [1000, 5000, 10000, 20000, 30000, 40000].forEach(n => {
          if (messages.length >= n) {
            results.push({ date: messages[n-1].date, title: `${formatNumber(n)}. Mesaj`, desc: 'Milestone', icon: '◆' });
          }
        });
        
        return results.sort((a, b) => new Date(a.date) - new Date(b.date));
      }, [messages]);
      
      return (
        <div className="space-y-6">
          <div className="text-center mb-8">
            <p className="font-mono text-xs text-accent mb-2">&gt; milestones.list()</p>
            <h2 className="font-serif text-3xl text-cream">Kilometre Taşları</h2>
          </div>
          
          <div className="max-w-2xl mx-auto">
            {milestones.map((m, index) => (
              <div key={index} className="flex gap-4 mb-6">
                <div className="flex flex-col items-center">
                  <div className="w-10 h-10 bg-mutedGray border border-accent flex items-center justify-center text-accent font-mono">
                    {m.icon}
                  </div>
                  {index < milestones.length - 1 && <div className="w-px h-full bg-mutedGray mt-2" />}
                </div>
                <div className="card-dark rounded-none p-4 flex-1 border-l-2 border-l-accent">
                  <p className="font-mono text-xs text-textMuted mb-1">{formatDate(m.date)}</p>
                  <h3 className="font-serif text-lg text-cream">{m.title}</h3>
                  <p className="font-serif text-sm text-textLight">{m.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ==================== HEATMAP ====================
    const Heatmap = ({ messages }) => {
      const { heatmapData, maxCount } = useMemo(() => {
        const dailyCounts = {};
        messages.forEach(m => { dailyCounts[m.date] = (dailyCounts[m.date] || 0) + 1; });
        
        const dates = Object.keys(dailyCounts).sort();
        if (dates.length === 0) return { heatmapData: [], maxCount: 0 };
        
        const startDate = new Date(dates[0]);
        const endDate = new Date(dates[dates.length - 1]);
        
        const weeks = [];
        let currentDate = new Date(startDate);
        currentDate.setDate(currentDate.getDate() - currentDate.getDay());
        
        while (currentDate <= endDate) {
          const week = [];
          for (let i = 0; i < 7; i++) {
            const dateStr = currentDate.toISOString().split('T')[0];
            week.push({ date: dateStr, count: dailyCounts[dateStr] || 0 });
            currentDate.setDate(currentDate.getDate() + 1);
          }
          weeks.push(week);
        }
        
        return { heatmapData: weeks, maxCount: Math.max(...Object.values(dailyCounts)) };
      }, [messages]);
      
      const getColor = (count) => {
        if (count === 0) return '#1a1a1a';
        const intensity = count / maxCount;
        if (intensity < 0.2) return '#2a2a2a';
        if (intensity < 0.4) return '#8b7355';
        if (intensity < 0.6) return '#c9a86c';
        if (intensity < 0.8) return '#ff006e';
        return '#00f5ff';
      };
      
      return (
        <div className="space-y-6">
          <div className="text-center mb-8">
            <p className="font-mono text-xs text-accent mb-2">&gt; heatmap.render()</p>
            <h2 className="font-serif text-3xl text-cream">Isı Haritası</h2>
          </div>
          
          <div className="card-dark rounded-none p-6 overflow-x-auto">
            <div className="flex gap-0.5 min-w-max">
              {heatmapData.map((week, weekIndex) => (
                <div key={weekIndex} className="flex flex-col gap-0.5">
                  {week.map((day, dayIndex) => (
                    <div
                      key={dayIndex}
                      className="w-3 h-3 heat-cell cursor-pointer"
                      style={{ backgroundColor: getColor(day.count) }}
                      title={`${formatDate(day.date)}: ${day.count} mesaj`}
                    />
                  ))}
                </div>
              ))}
            </div>
            
            <div className="flex items-center justify-end gap-1 mt-4">
              <span className="font-mono text-xs text-textMuted mr-2">az</span>
              {['#1a1a1a', '#2a2a2a', '#8b7355', '#c9a86c', '#ff006e', '#00f5ff'].map((color, i) => (
                <div key={i} className="w-3 h-3" style={{ backgroundColor: color }} />
              ))}
              <span className="font-mono text-xs text-textMuted ml-2">çok</span>
            </div>
          </div>
        </div>
      );
    };

    // ==================== FINAL SCREEN ====================
    const FinalScreen = ({ onBack }) => (
      <div className="fixed inset-0 bg-dark flex items-center justify-center z-50 p-4">
        <div className="text-center max-w-2xl">
          <img src={`data:image/png;base64,${LOGO_BASE64}`} alt="nur:şiv" className="w-48 mx-auto mb-8 opacity-50" />
          <p className="font-mono text-xs text-accent mb-4">// end.render()</p>
          <h1 className="font-serif text-3xl md:text-4xl text-cream italic mb-6">"Bu sadece bir analiz değil, bizim hikâyemiz."</h1>
          <p className="font-serif text-textLight leading-relaxed mb-8">
            41.693 mesaj. 355 gün. Bir bayram mesajıyla başlayan, Karakoyunlu Sokak'ta kesişen, Nora'da buluşan yolculuk.
          </p>
          <p className="font-serif text-lg text-accent italic mb-2">Nur'a, hayatıma anlam katan insana.</p>
          <p className="font-mono text-xs text-textMuted mb-8">— Fırat</p>
          <button onClick={onBack} className="font-mono text-textMuted hover:text-accent transition-colors">← geri</button>
        </div>
      </div>
    );

    // ==================== MAIN APP ====================
    const App = () => {
      const [showWelcome, setShowWelcome] = useState(true);
      const [showFinal, setShowFinal] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      
      useEffect(() => {
        fetch('messages.json')
          .then(res => { if (!res.ok) throw new Error('Dosya bulunamadı'); return res.json(); })
          .then(data => { setMessages(data); setLoading(false); })
          .catch(err => { setError(err.message); setLoading(false); });
      }, []);
      
      const stats = useMemo(() => {
        if (!messages.length) return {};
        
        const firatMsgs = messages.filter(m => m.sender === 'Fırat');
        const nurMsgs = messages.filter(m => m.sender === 'Nur');
        
        const dates = [...new Set(messages.map(m => m.date))].sort();
        const firstDate = dates[0];
        const lastDate = dates[dates.length - 1];
        const totalDays = Math.ceil((new Date(lastDate) - new Date(firstDate)) / (1000 * 60 * 60 * 24)) + 1;
        
        const nightMsgs = messages.filter(m => isNightMessage(m.time));
        const avgLength = Math.round(messages.reduce((sum, m) => sum + m.text.length, 0) / messages.length);
        const firatAvgLength = Math.round(firatMsgs.reduce((sum, m) => sum + m.text.length, 0) / firatMsgs.length);
        const nurAvgLength = Math.round(nurMsgs.reduce((sum, m) => sum + m.text.length, 0) / nurMsgs.length);
        
        const monthlyMap = {};
        messages.forEach(m => { monthlyMap[m.date.slice(0, 7)] = (monthlyMap[m.date.slice(0, 7)] || 0) + 1; });
        const monthlyData = Object.entries(monthlyMap).sort((a, b) => a[0].localeCompare(b[0])).map(([month, count]) => {
          const [y, m] = month.split('-');
          const names = ['Oca', 'Şub', 'Mar', 'Nis', 'May', 'Haz', 'Tem', 'Ağu', 'Eyl', 'Eki', 'Kas', 'Ara'];
          return { month: `${names[parseInt(m) - 1]} ${y.slice(2)}`, count };
        });
        
        const hourlyMap = {};
        for (let i = 0; i < 24; i++) hourlyMap[i] = 0;
        messages.forEach(m => { if (m.time) hourlyMap[parseInt(m.time.split(':')[0])]++; });
        const hourlyData = Object.entries(hourlyMap).map(([hour, count]) => ({ hour: parseInt(hour), count }));
        const peakHour = hourlyData.reduce((prev, curr) => curr.count > prev.count ? curr : prev).hour;
        
        return {
          totalMessages: messages.length,
          totalDays, firstDate, lastDate,
          nightMessages: nightMsgs.length,
          avgMessageLength: avgLength,
          firatMessages: firatMsgs.length,
          nurMessages: nurMsgs.length,
          firatAvgLength, nurAvgLength,
          monthlyData, hourlyData, peakHour,
          topWords: getWordFrequency(messages),
          topEmojis: getEmojiFrequency(messages)
        };
      }, [messages]);
      
      if (showWelcome) return <WelcomeScreen onStart={() => setShowWelcome(false)} loading={loading} error={error} />;
      if (showFinal) return <FinalScreen onBack={() => setShowFinal(false)} />;
      
      return (
        <div className="min-h-screen pb-20 relative z-10">
          <Navigation activeTab={activeTab} setActiveTab={setActiveTab} />
          
          <main className="max-w-7xl mx-auto px-4 py-6">
            {activeTab === 'dashboard' && <Dashboard stats={stats} messages={messages} />}
            {activeTab === 'story' && <StoryMode stats={stats} messages={messages} />}
            {activeTab === 'search' && <Search messages={messages} />}
            {activeTab === 'memory' && <RandomMemory messages={messages} />}
            {activeTab === 'playback' && <PlaybackMode messages={messages} />}
            {activeTab === 'insights' && <Insights stats={stats} messages={messages} />}
            {activeTab === 'milestones' && <Milestones messages={messages} stats={stats} />}
            {activeTab === 'heatmap' && <Heatmap messages={messages} />}
          </main>
          
          <footer className="fixed bottom-0 left-0 right-0 bg-dark/95 backdrop-blur-sm border-t border-mutedGray py-3 px-4 z-40">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <span className="font-mono text-xs text-textMuted">// client-side only</span>
              <button onClick={() => setShowFinal(true)} className="font-mono text-xs text-textMuted hover:text-accent transition-colors">
                [ SON ]
              </button>
            </div>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
